<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Terminal Monitor de TI: CofrinhoApp</title>
    <style>
        /* CSS: Estilo Terminal Hacker / Console de TI */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #0c0c0d; 
            color: #4af626; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .terminal { 
            background-color: #16161a; 
            width: 750px; 
            height: 500px; 
            border-radius: 6px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            border: 1px solid #33333b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Barra superior do console */
        .terminal-header {
            background-color: #232329;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #33333b;
        }
        .terminal-title { 
            font-size: 12px; 
            color: #a1a1a6; 
            font-weight: bold; 
        }
        .terminal-buttons { 
            display: flex; 
            gap: 6px; 
        }
        .dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            display: inline-block; 
        }
        .dot-red { 
            background-color: #ff5f56; 
        }
        .dot-yellow { 
            background-color: #ffbd2e; 
        }
        .dot-green { 
            background-color: #27c93f; 
        }

        /* Corpo do terminal dividido em Painel de Controle e Histórico de Logs */
        .terminal-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .painel-controle {
            width: 280px;
            padding: 15px;
            border-right: 1px solid #33333b;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }
        .console-logs {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-color: #0c0c0d;
        }

        /* Inputs e seletores estilizados como CLI */
        label { 
            font-size: 11px; 
            color: #a1a1a6; 
            text-transform: uppercase; 
        }
        select, input, button {
            background-color: #1c1c22;
            color: #4af626;
            border: 1px solid #4af626;
            padding: 8px;
            font-family: inherit;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px;
        }
        select:focus, input:focus { 
            outline: none; 
            background-color: #232329; 
        }
        
        button {
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover { 
            background-color: #4af626; 
            color: #0c0c0d; 
        }
        .btn-rem { 
            border-color: #ff5f56; 
            color: #ff5f56; 
        }
        .btn-rem:hover { 
            background-color: #ff5f56; 
            color: #0c0c0d; 
        }

        /* Linhas de logs do terminal */
        .log-linha { 
            font-size: 12px; 
            line-height: 1.4; 
            white-space: pre-wrap; 
        }
        .log-cmd { 
            color: #00bfff; 
        } /* Comando enviado */
        .log-success { 
            color: #4af626; 
        } /* Resposta bem-sucedida */
        .log-error { 
            color: #ff5f56; 
        } /* Falhas de conexão */
        .log-info { 
            color: #ffbd2e; 
        } /* Estado atual */
    </style>
</head>
<body>

<div class="terminal">
    <div class="terminal-header">
        <div class="terminal-buttons">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
        </div>
        <div class="terminal-title">bash - root@localhost:8087/allan/system/cofrinho</div>
        <div></div>
    </div>
    
    <div class="terminal-body">
        <!-- Coluna Esquerda: Inserção de Dados -->
        <div class="painel-controle">
            <label>> selecionar_moeda:</label>
            <select id="selectMoeda">
                <option value="1">1. Real (R$)</option>
                <option value="2">2. Dólar (US$)</option>
                <option value="3">3. Libra (£)</option>
                <option value="4">4. Euro (€)</option>
            </select>

            <label>> definir_valor:</label>
            <input type="number" id="numValor" step="0.01" placeholder="0.00" autocomplete="off">

            <button onclick="executarComando('ADD')">[+] Executar ADD</button>
            <button class="btn-rem" onclick="executarComando('REM')">[-] Executar REM</button>
        </div>

        <!-- Coluna Direita: Saída do Monitor de Logs -->
        <div class="console-logs" id="terminalLogs">
            <div class="log-linha log-info">[SISTEMA] Monitor de TI inicializado com sucesso.</div>
            <div class="log-linha log-info">[STATUS] Aguardando conexões na porta 8087...</div>
        </div>
    </div>
</div>

<script>
    const logger = document.getElementById('terminalLogs');

    // Imprime novas linhas no console simulado
    function imprimirLog(texto, tipo) {
        const timestamp = new Date().toLocaleTimeString();
        const novaLinha = document.createElement('div');
        novaLinha.className = `log-linha ${tipo}`;
        novaLinha.innerText = `[${timestamp}] ${texto}`;
        logger.appendChild(novaLinha);
        logger.scrollTop = logger.scrollHeight; // Auto-scroll
    }

    async function executarComando(operacao) {
        const tipo = document.getElementById('selectMoeda').value;
        const valor = document.getElementById('numValor').value;

        if (!valor || valor <= 0) {
            imprimirLog(`ERRO: Parâmetro 'valor' inválido (${valor}).`, "log-error");
            return;
        }

        const payload = `${operacao}|${tipo}|${valor}`;
        
        // Loga a intenção de envio no terminal (Comando de Saída)
        imprimirLog(`POST --> http://localhost:8087/cofrinho | Payload: "${payload}"`, "log-cmd");

        try {
            const res = await fetch('http://localhost:8087/cofrinho', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: payload
            });

            const data = await res.json();

            // Loga a resposta tratada do servidor Java
            imprimirLog(`HTTP 200 OK <-- Dados computados via POO Java`, "log-success");
            imprimirLog(`[MONITOR] Total Convertido em Real: R$ ${data.total.toFixed(2)}`, "log-info");
            
            // Lista a coleção do ArrayList do Java direto nas linhas de log
            if (data.moedas.length > 0) {
                let strMoedas = data.moedas.map(m => m.info).join(" | ");
                imprimirLog(`[ARRAYLIST] Coleção atual: [ ${strMoedas} ]`, "log-success");
            } else {
                imprimirLog(`[ARRAYLIST] Coleção limpa (Vazia)`, "log-info");
            }

            document.getElementById('numValor').value = ''; // Limpa entrada

        } catch (err) {
            imprimirLog("CRITICAL ERROR: Não foi possível alcançar o servidor Java na porta 8087.", "log-error");
            imprimirLog("DICA DE TI: Execute 'java CofrinhoApp' no seu prompt de comando.", "log-info");
        }
    }
</script>
</body>
</html>
